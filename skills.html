<!DOCTYPE html>
<html>
<head>

<title>Skills - Anandu G</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* Navbar */

nav{
background:black;
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#00d9ff;
}

/* Skills Section */

.skills{
max-width:800px;
margin:auto;
padding:40px;
}

.skills h1{
font-size:40px;
margin-bottom:40px;
}

/* Skill Bar */

.skill{
margin:20px 0;
text-align:left;
}

.skill p{
margin-bottom:5px;
}

.bar{
background:#333;
height:12px;
border-radius:10px;
overflow:hidden;
}

.bar span{
display:block;
height:100%;
background:#00d9ff;
width:0;
animation:fill 2s forwards;
}

/* Individual Skill Levels */

.html span{width:85%;}
.python span{width:75%;}
.c span{width:70%;}
.ml span{width:60%;}
.ai span{width:55%;}
.git span{width:65%;}
.problem span{width:80%;}

/* Animation */

@keyframes fill{
from{width:0;}
}

/* Hover Effect */

.skill:hover{
transform:scale(1.05);
transition:0.3s;
}

</style>

</head>

<body>

<nav>

</nav>

</html>
